<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pose + Hand Tracker</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: radial-gradient(ellipse at top, #111827 0%, #050608 70%);
        color: #e5e7eb;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      h1 {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.14em;
        color: #94a3b8;
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      .wrap {
        display: grid;
        grid-template-columns: auto 360px;
        gap: 20px;
        align-items: start;
      }
      .stage {
        position: relative;
        width: 640px;
        height: 480px;
        background: #000;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px #1f2937 inset;
      }
      .mirror {
        position: absolute;
        inset: 0;
        transform: scaleX(-1);
      }
      video, canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .status {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(0,0,0,0.65);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 11px;
        letter-spacing: 0.06em;
        z-index: 10;
        backdrop-filter: blur(4px);
      }
      .legend {
        position: absolute;
        bottom: 12px;
        left: 12px;
        display: flex;
        gap: 12px;
        background: rgba(0,0,0,0.65);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 11px;
        letter-spacing: 0.04em;
        backdrop-filter: blur(4px);
      }
      .swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      .panel {
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid #1f2937;
        border-radius: 14px;
        padding: 18px;
        font-size: 12px;
        line-height: 1.65;
      }
      .panel pre {
        font-family: inherit;
        white-space: pre-wrap;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Pose + Hand Tracker · MediaPipe Pose + Hand Landmarker</h1>
      <div class="wrap">
        <div class="stage">
          <div class="status" id="status">initializing…</div>
          <div class="mirror">
            <video id="cam" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
          </div>
          <div class="legend">
            <span><span class="swatch" style="background:#22d3ee"></span>left arm + hand</span>
            <span><span class="swatch" style="background:#f472b6"></span>right arm + hand</span>
            <span><span class="swatch" style="background:#fde047"></span>fingertips</span>
          </div>
        </div>
        <div class="panel">
          <pre id="readout">waiting for camera…</pre>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
